version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: always

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - api
      - web
